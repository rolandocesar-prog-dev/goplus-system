name: goplus_repartidor
description: "GoPlus Repartidor - App para deliverys con tracking en tiempo real"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # ========================================
  # GOPLUS PACKAGES - ARQUITECTURA MODULAR
  # ========================================
  goplus_core:
    path: ../../packages/goplus_core
  goplus_firebase:
    path: ../../packages/goplus_firebase
  goplus_ui:
    path: ../../packages/goplus_ui

  # ========================================
  # STATE MANAGEMENT - BLOC PATTERN
  # ========================================
  flutter_bloc: ^8.1.6
  bloc_concurrency: ^0.2.5

  # ========================================
  # NAVIGATION - MODERN ROUTING
  # ========================================
  go_router: ^14.6.0

  # ========================================
  # UBICACIÓN & TRACKING - CORE REPARTIDOR
  # ========================================
  
  # ✅ PRINCIPAL: Plugin de ubicación compatible
  geolocator: ^13.0.2
  
  # ❌ REMOVIDO: workmanager (causaba problemas de compatibilidad)
  # workmanager: ^0.5.1  # ELIMINADO
  
  # ✅ PERMISOS: Gestión moderna de permisos
  permission_handler: ^11.3.1
  
  # ✅ CONECTIVIDAD: Monitorear conexión
  connectivity_plus: ^6.0.5

  # ========================================
  # MAPAS & NAVEGACIÓN
  # ========================================
  google_maps_flutter: ^2.9.0
  google_polyline_algorithm: ^3.1.0
  geolocator_platform_interface: ^4.2.3

  # ========================================
  # SCANNERS - QR/CÓDIGOS DE BARRA
  # ========================================
  # ❌ REMOVIDO: qr_code_scanner (problemas de compatibilidad)
  # qr_code_scanner: ^1.0.1  # ELIMINADO
  
  # ✅ USAR SOLO: mobile_scanner (moderno y compatible)
  mobile_scanner: ^5.2.3

  # ========================================
  # UI/UX
  # ========================================
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # ========================================
  # ASSETS - REPARTIDOR
  # ========================================
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/animations/

  # ========================================
  # FONTS PERSONALIZADAS
  # ========================================
  # fonts:
  #   - family: GoPlus
  #     fonts:
  #       - asset: assets/fonts/GoPlus-Regular.ttf
  #       - asset: assets/fonts/GoPlus-Bold.ttf
  #         weight: 700