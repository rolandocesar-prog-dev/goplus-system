name: goplus_repartidor
description: "GoPlus Repartidor - App para deliverys"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # GoPlus packages
  goplus_core:
    path: ../../packages/goplus_core
  goplus_firebase:
    path: ../../packages/goplus_firebase
  goplus_ui:
    path: ../../packages/goplus_ui

  # State Management
  flutter_bloc: ^8.1.6

  # Navigation
  go_router: ^14.6.0

  # ========================================
  # UBICACIÓN - PLUGINS MODERNOS Y ESTABLES
  # ========================================
  
  # ✅ RECOMENDADO: Plugin principal de ubicación (actualizado y estable)
  geolocator: ^13.0.2
  
  # ✅ ALTERNATIVA: Plugin de ubicación con mejor control
  location: ^7.0.0
  
  # ✅ BACKGROUND TASKS: WorkManager moderno para tareas en segundo plano
  workmanager: ^0.5.2
  
  # ✅ PERMISSOS: Gestión moderna de permisos
  permission_handler: ^11.3.1

  # Maps & Navigation
  google_maps_flutter: ^2.9.0
  google_polyline_algorithm: ^3.1.0

  # QR Scanner
  mobile_scanner: ^5.0.4

  # Push Notifications
  flutter_local_notifications: ^17.2.3

  # Network & Connectivity
  connectivity_plus: ^6.0.5
  dio: ^5.7.0

  # Storage & Cache
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Phone calls
  url_launcher: ^6.3.1

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI/UX
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  # Assets específicos del repartidor
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/sounds/
    
  # Fuentes
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700