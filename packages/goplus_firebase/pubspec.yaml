name: goplus_firebase
description: Firebase services abstractions for GoPlus applications
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Core package
  goplus_core:
    path: ../goplus_core

  # Firebase packages
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_messaging: ^14.7.10

  # Additional Firebase utilities
  firebase_app_check: ^0.2.1+7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Firebase testing
  fake_cloud_firestore: ^2.4.1+1

flutter:
