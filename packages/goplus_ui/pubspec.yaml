name: goplus_ui
description: Advanced UI components, animations and layouts for GoPlus applications
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Core package
  goplus_core:
    path: ../goplus_core

  # UI and Animations
  animations: ^2.0.8
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.0.9

  # Image handling
  cached_network_image: ^3.3.1

  # Loading indicators
  shimmer: ^3.0.0

  # Charts and graphs
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Golden tests for UI
  golden_toolkit: ^0.15.0

flutter:
