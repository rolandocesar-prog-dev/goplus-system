name: goplus_ui
description: Advanced UI components, animations and layouts for GoPlus applications
version: 1.0.0+1
publish_to: none # Agregar esta línea

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Core package
  goplus_core:
    path: ../goplus_core

  # Animaciones fluidas entre pantallas y estados
  animations: ^2.0.8

  # Grillas personalizadas para mostrar menús y productos
  flutter_staggered_grid_view: ^0.7.0

  # Iconos vectoriales escalables
  flutter_svg: ^2.0.9

  # Carga y caché eficiente de imágenes de productos
  cached_network_image: ^3.3.1

  # Efectos de carga elegantes mientras cargan datos
  shimmer: ^3.0.0

  # Gráficos para estadísticas de ventas y reportes
  fl_chart: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Pruebas visuales para mantener consistencia en la UI
  golden_toolkit: ^0.15.0

flutter:
