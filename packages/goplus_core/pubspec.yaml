name: goplus_core
description: Core shared library for GoPlus applications containing models, services, theme and common widgets
version: 1.0.0+1
publish_to: none # Agregar esta línea

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Facilita la comparación de objetos en el estado de la app, especialmente útil para modelos de datos como pedidos y usuarios
  equatable: ^2.0.5

  # Guarda configuraciones del usuario (preferencias, sesión activa, direcciones favoritas)
  shared_preferences: ^2.2.2

  # Convierte automáticamente entre objetos Dart y JSON para comunicación con APIs
  json_annotation: ^4.8.1

  # Formateo de fechas, números y monedas (precios, horarios de entrega)
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
