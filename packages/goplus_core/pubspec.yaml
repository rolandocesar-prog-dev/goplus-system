name: goplus_core
description: Core shared library for GoPlus applications containing models, services, theme and common widgets
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  equatable: ^2.0.5

  # Local Storage
  shared_preferences: ^2.2.2

  # JSON serialization
  json_annotation: ^4.8.1

  # Utilities
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
